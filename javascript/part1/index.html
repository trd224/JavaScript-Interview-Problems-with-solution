<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Interview Problems</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #f0e040;
    --accent2: #40e0f0;
    --accent3: #f040a0;
    --text: #e8e8f0;
    --muted: #888899;
    --green: #40f0a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,224,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,224,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  /* HEADER */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    position: relative;
  }

  .header-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: block;
  }

  h1 {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  h1 span.yellow { color: var(--accent); }
  h1 span.cyan { color: var(--accent2); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-top: 16px;
  }

  .stats {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 260px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 16px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* CATEGORIES GRID */
  .categories {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .category-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .category-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .card-icon {
    font-size: 20px;
    width: 36px;
    text-align: center;
  }

  .card-title {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .card-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .card-toggle {
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.3s;
  }

  .card-toggle.open { transform: rotate(45deg); color: var(--accent); }

  .card-body {
    display: none;
    padding: 0;
  }

  .card-body.open { display: block; }

  .problem-list {
    list-style: none;
    max-height: 360px;
    overflow-y: auto;
  }

  .problem-list::-webkit-scrollbar { width: 4px; }
  .problem-list::-webkit-scrollbar-track { background: var(--surface); }
  .problem-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .problem-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    cursor: pointer;
    transition: background 0.15s;
  }

  .problem-item:last-child { border-bottom: none; }

  .problem-item:hover { background: rgba(240,224,64,0.05); }

  .problem-item.done { opacity: 0.5; }
  .problem-item.done .problem-text { text-decoration: line-through; }

  .problem-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
  }

  .problem-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }

  .check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-top: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }

  .problem-item.done .check {
    background: var(--green);
    border-color: var(--green);
    color: var(--bg);
  }

  /* DIFF BADGE */
  .diff {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .diff.easy { background: rgba(64,240,160,0.15); color: var(--green); }
  .diff.med { background: rgba(240,224,64,0.15); color: var(--accent); }
  .diff.hard { background: rgba(240,64,160,0.15); color: var(--accent3); }

  /* PROGRESS BAR */
  .progress-bar {
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* FOOTER */
  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 100;
  }

  .footer-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .footer-progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .footer-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s;
  }

  .footer-count {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
  }

  pb { padding-bottom: 80px; display: block; }

  /* Color accent per category */
  .c0 .card-header { border-left: 3px solid #f0e040; }
  .c1 .card-header { border-left: 3px solid #40e0f0; }
  .c2 .card-header { border-left: 3px solid #f040a0; }
  .c3 .card-header { border-left: 3px solid #40f0a0; }

  .c5 .card-header { border-left: 3px solid #f09040; }

  .c9 .card-header { border-left: 3px solid #40f0a0; }
  .c10 .card-header { border-left: 3px solid #a040f0; }
  .c11 .card-header { border-left: 3px solid #f09040; }
  .c12 .card-header { border-left: 3px solid #f0e040; }
  .c13 .card-header { border-left: 3px solid #40e0f0; }
  .c14 .card-header { border-left: 3px solid #f040a0; }

</style>
</head>

// Load saved progress
let done = JSON.parse(localStorage.getItem('jsDone') || '{}');
let currentFilter = 'all';
let globalNum = 1;

function getKey(catIdx, probIdx) { return `${catIdx}-${probIdx}`; }

function saveDone() {
  localStorage.setItem('jsDone', JSON.stringify(done));
  updateProgress();
}

function updateProgress() {
  const total = categories.reduce((s, c) => s + c.problems.length, 0);
  const doneCount = Object.values(done).filter(Boolean).length;
  document.getElementById('doneCount').textContent = doneCount;
  document.getElementById('footerDone').textContent = doneCount;
  document.getElementById('footerTotal').textContent = total;
  document.getElementById('footerFill').style.width = (doneCount / total * 100) + '%';
}

function buildCards(filter, search) {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = '';
  let gNum = 1;
  let any = false;

  categories.forEach((cat, catIdx) => {
    const filtered = cat.problems.filter(p => {
      const matchFilter = filter === 'all' || p.diff === filter;
      const matchSearch = !search || p.text.toLowerCase().includes(search.toLowerCase());
      return matchFilter && matchSearch;
    });

    if (filtered.length === 0) { gNum += cat.problems.length; return; }
    any = true;

    const card = document.createElement('div');
    card.className = `category-card c${cat.color}`;
    card.style.animationDelay = `${catIdx * 0.04}s`;

    const doneInCat = filtered.filter((p, i) => done[getKey(catIdx, cat.problems.indexOf(p))]).length;
    const pct = Math.round(doneInCat / filtered.length * 100);

    card.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="card-header">
        <span class="card-icon">${cat.icon}</span>
        <span class="card-title">${cat.title}</span>
        <span class="card-count">${doneInCat}/${filtered.length}</span>
        <span class="card-toggle">+</span>
      </div>
      <div class="card-body">
        <ul class="problem-list"></ul>
      </div>
    `;

    const header = card.querySelector('.card-header');
    const body = card.querySelector('.card-body');
    const toggle = card.querySelector('.card-toggle');
    const list = card.querySelector('.problem-list');

    cat.problems.forEach((p, probIdx) => {
      const matchFilter = filter === 'all' || p.diff === filter;
      const matchSearch = !search || p.text.toLowerCase().includes(search.toLowerCase());
      if (!matchFilter || !matchSearch) { return; }

      const key = getKey(catIdx, probIdx);
      const isDone = done[key];
      const li = document.createElement('li');
      li.className = `problem-item${isDone ? ' done' : ''}`;
      li.innerHTML = `
        <div class="check">${isDone ? '✓' : ''}</div>
        <span class="problem-num">#${String(gNum).padStart(3,'0')}</span>
        <span class="problem-text">${p.text}</span>
        <span class="diff ${p.diff}">${p.diff === 'med' ? 'Med' : p.diff.charAt(0).toUpperCase() + p.diff.slice(1)}</span>
      `;
      li.addEventListener('click', () => {
        done[key] = !done[key];
        saveDone();
        li.classList.toggle('done');
        li.querySelector('.check').textContent = done[key] ? '✓' : '';
        // update card count
        const newDone = cat.problems.filter((_, i) => done[getKey(catIdx, i)]).length;
        card.querySelector('.card-count').textContent = `${newDone}/${filtered.length}`;
        const newPct = Math.round(newDone / filtered.length * 100);
        card.querySelector('.progress-fill').style.width = newPct + '%';
      });
      list.appendChild(li);
      gNum++;
    });

    header.addEventListener('click', () => {
      body.classList.toggle('open');
      toggle.classList.toggle('open');
    });

    grid.appendChild(card);
  });

  if (!any) {
    grid.innerHTML = '<div class="no-results">// no problems match your search</div>';
  }

  updateProgress();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildCards(currentFilter, document.getElementById('searchInput').value);
  });
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    buildCards(currentFilter, e.target.value);
  }, 200);
});

buildCards('all', '');
