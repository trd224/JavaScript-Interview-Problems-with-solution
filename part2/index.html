<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Mastery — 2000+ Problems</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080d;
  --surface: #0d0e16;
  --card: #111320;
  --border: #1e2035;
  --border2: #2a2d4a;
  --accent: #6ee7b7;
  --accent2: #818cf8;
  --accent3: #fb7185;
  --accent4: #fbbf24;
  --text: #e2e8f0;
  --muted: #64748b;
  --easy: #6ee7b7;
  --med: #fbbf24;
  --hard: #fb7185;
  --font-mono: 'IBM Plex Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(110,231,183,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(129,140,248,0.04) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* LAYOUT */
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 50;
  transition: transform 0.3s;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--surface);
  z-index: 1;
}
.logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.logo span { color: var(--accent2); }

.overall-progress {
  margin-top: 12px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 6px;
}
.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.4s ease;
}

.nav-section { padding: 8px 0; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 2px solid transparent;
  font-size: 11px;
  color: var(--muted);
}
.nav-item:hover { background: rgba(110,231,183,0.05); color: var(--text); }
.nav-item.active {
  background: rgba(110,231,183,0.08);
  border-left-color: var(--accent);
  color: var(--accent);
}
.nav-icon { font-size: 14px; width: 20px; text-align: center; }
.nav-label { flex: 1; }
.nav-count {
  font-size: 10px;
  color: var(--muted);
  background: var(--card);
  padding: 1px 6px;
  border-radius: 10px;
}
.nav-done-pct {
  font-size: 10px;
  color: var(--accent);
}

/* MAIN */
.main {
  margin-left: 280px;
  flex: 1;
  min-width: 0;
}

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(7,8,13,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-wrap { flex: 1; position: relative; }
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
}
.search {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 9px 12px 9px 34px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }

.pill-group { display: flex; gap: 6px; }
.pill {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.pill.easy.active { background: var(--easy); border-color: var(--easy); }
.pill.med.active { background: var(--med); border-color: var(--med); }
.pill.hard.active { background: var(--hard); border-color: var(--hard); }

/* HERO */
.hero {
  padding: 40px 32px 24px;
  border-bottom: 1px solid var(--border);
}
.hero-tag {
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero-title {
  font-size: clamp(28px, 4vw, 52px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text);
}
.hero-title .hl1 { color: var(--accent); }
.hero-title .hl2 { color: var(--accent2); }
.hero-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
}
.hero-stats {
  display: flex;
  gap: 28px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.hstat { display: flex; flex-direction: column; gap: 2px; }
.hstat-num { font-size: 26px; font-weight: 700; color: var(--accent4); }
.hstat-lab { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

/* CONTENT */
.content { padding: 24px 32px 100px; }

/* SECTION */
.section {
  margin-bottom: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--card);
}
.section-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: background 0.15s;
}
.section-header:hover { background: rgba(255,255,255,0.02); }
.section-header.open { border-bottom-color: var(--border); }
.sec-icon { font-size: 18px; }
.sec-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.sec-stats { display: flex; gap: 8px; align-items: center; }
.sec-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
}
.sec-done { color: var(--accent); font-size: 11px; font-weight: 600; }
.sec-toggle {
  font-size: 18px;
  color: var(--muted);
  transition: transform 0.3s, color 0.2s;
  line-height: 1;
}
.section-header.open .sec-toggle { transform: rotate(45deg); color: var(--accent); }

.section-progress { height: 2px; background: var(--border); }
.section-progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

.section-body { display: none; }
.section-body.open { display: block; }

/* SUBCATEGORY */
.subcat {
  border-bottom: 1px solid var(--border);
}
.subcat:last-child { border-bottom: none; }
.subcat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.01);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--accent2);
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.subcat-header:hover { background: rgba(129,140,248,0.05); }
.subcat-toggle { margin-left: auto; color: var(--muted); font-size: 12px; transition: transform 0.2s; }
.subcat-header.open .subcat-toggle { transform: rotate(90deg); }
.subcat-list { display: none; }
.subcat-list.open { display: block; }

/* PROBLEM ROW */
.prob {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 9px 20px 9px 28px;
  border-bottom: 1px solid rgba(30,32,53,0.6);
  cursor: pointer;
  transition: background 0.12s;
}
.prob:last-child { border-bottom: none; }
.prob:hover { background: rgba(110,231,183,0.04); }
.prob.solved { opacity: 0.45; }
.prob.solved .prob-text { text-decoration: line-through; color: var(--muted); }

.prob-check {
  width: 15px; height: 15px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  transition: all 0.2s;
}
.prob.solved .prob-check { background: var(--accent); border-color: var(--accent); color: var(--bg); }

.prob-num {
  font-size: 9px;
  color: var(--muted);
  min-width: 32px;
  padding-top: 3px;
  flex-shrink: 0;
}
.prob-text { font-size: 12px; flex: 1; line-height: 1.5; color: var(--text); }
.prob-tags { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; flex-wrap: wrap; justify-content: flex-end; }
.diff-tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 2px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 600;
}
.diff-tag.easy { background: rgba(110,231,183,0.12); color: var(--easy); }
.diff-tag.med  { background: rgba(251,191,36,0.12);  color: var(--med);  }
.diff-tag.hard { background: rgba(251,113,133,0.12); color: var(--hard); }

/* HIDDEN */
.hidden { display: none !important; }

/* FOOTER FIXED */
.footer-fixed {
  position: fixed;
  bottom: 0; left: 280px; right: 0;
  background: rgba(7,8,13,0.96);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 40;
}
.foot-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; white-space: nowrap; }
.foot-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.foot-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s; }
.foot-count { font-size: 12px; color: var(--accent); font-weight: 700; white-space: nowrap; }
.foot-pct { font-size: 10px; color: var(--muted); white-space: nowrap; }

/* MOBILE */
.menu-btn {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
}
@media(max-width:768px){
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .footer-fixed { left: 0; }
  .menu-btn { display: block; }
  .topbar { padding: 10px 16px; }
  .hero, .content { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->

<main class="main">

  <div class="content" id="content"></div>
</main>

<!-- FOOTER -->
<div class="footer-fixed">

  <span class="foot-count" id="footCount">0 / 0</span>
  <span class="foot-pct" id="footPct">0%</span>
</div>

</div>

// ============================================================
// STATE
// ============================================================
let solved = {};
try { solved = JSON.parse(localStorage.getItem('jsMastery') || '{}'); } catch(e){}

let activeFilter = 'all';
let searchTerm = '';

function totalProbs() {
  return DATA.reduce((s,cat) => s + cat.subs.reduce((ss,sub) => ss + sub.problems.length, 0), 0);
}
function totalSolved() {
  return Object.values(solved).filter(Boolean).length;
}
function saveSolved() {
  localStorage.setItem('jsMastery', JSON.stringify(solved));
}
function probKey(catId, subIdx, probIdx) { return `${catId}::${subIdx}::${probIdx}`; }

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  DATA.forEach(cat => {
    const catTotal = cat.subs.reduce((s,sub) => s + sub.problems.length, 0);
    const catDone = cat.subs.reduce((s,sub,si) =>
      s + sub.problems.filter((_,pi) => solved[probKey(cat.id,si,pi)]).length, 0);
    const pct = catTotal ? Math.round(catDone/catTotal*100) : 0;

    const item = document.createElement('div');
    item.className = 'nav-item';
    item.dataset.cat = cat.id;
    item.innerHTML = `
      <span class="nav-icon">${cat.icon}</span>
      <span class="nav-label">${cat.title.replace(/^\d+\.\s*/,'')}</span>
      <span class="nav-count">${catTotal}</span>
      ${catDone > 0 ? `<span class="nav-done-pct">${pct}%</span>` : ''}
    `;
    item.addEventListener('click', () => {
      const el = document.getElementById('sec-'+cat.id);
      if(el) { el.scrollIntoView({behavior:'smooth', block:'start'}); }
      if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    });
    nav.appendChild(item);
  });
}

// ============================================================
// MAIN CONTENT
// ============================================================
function buildContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  DATA.forEach((cat, ci) => {
    const section = document.createElement('div');
    section.className = 'section';
    section.id = 'sec-' + cat.id;

    const catTotal = cat.subs.reduce((s,sub) => s + sub.problems.length, 0);
    const catDone = cat.subs.reduce((s,sub,si) =>
      s + sub.problems.filter((_,pi) => solved[probKey(cat.id,si,pi)]).length, 0);
    const pct = catTotal ? Math.round(catDone/catTotal*100) : 0;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="sec-icon">${cat.icon}</span>
      <span class="sec-title">${cat.title}</span>
      <div class="sec-stats">
        <span class="sec-badge">${catTotal} problems</span>
        <span class="sec-done">${catDone}/${catTotal}</span>
      </div>
      <span class="sec-toggle">+</span>
    `;

    const progressBar = document.createElement('div');
    progressBar.className = 'section-progress';
    progressBar.innerHTML = `<div class="section-progress-fill" style="width:${pct}%"></div>`;

    const body = document.createElement('div');
    body.className = 'section-body';

    cat.subs.forEach((sub, si) => {
      const subDiv = document.createElement('div');
      subDiv.className = 'subcat';

      const subHeader = document.createElement('div');
      subHeader.className = 'subcat-header open';
      subHeader.innerHTML = `<span>${sub.name}</span><span class="subcat-toggle">▶</span>`;

      const subList = document.createElement('div');
      subList.className = 'subcat-list open';

      let globalProbNum = 1;
      // count offset
      let offset = 0;
      for(let i=0; i<ci; i++) offset += DATA[i].subs.reduce((s,s2) => s+s2.problems.length, 0);
      for(let i=0; i<si; i++) offset += cat.subs[i].problems.length;

      sub.problems.forEach((prob, pi) => {
        const key = probKey(cat.id, si, pi);
        const isSolved = !!solved[key];

        const matchFilter = activeFilter === 'all' || prob.d === activeFilter;
        const matchSearch = !searchTerm || prob.t.toLowerCase().includes(searchTerm.toLowerCase());
        if(!matchFilter || !matchSearch) return;

        const row = document.createElement('div');
        row.className = `prob${isSolved ? ' solved' : ''}`;
        row.dataset.key = key;
        row.innerHTML = `
          <div class="prob-check">${isSolved ? '✓' : ''}</div>
          <span class="prob-num">#${String(offset+pi+1).padStart(4,'0')}</span>
          <span class="prob-text">${prob.t}</span>
          <div class="prob-tags"><span class="diff-tag ${prob.d}">${prob.d==='med'?'Med':prob.d.charAt(0).toUpperCase()+prob.d.slice(1)}</span></div>
        `;
        row.addEventListener('click', () => {
          solved[key] = !solved[key];
          saveSolved();
          row.classList.toggle('solved');
          row.querySelector('.prob-check').textContent = solved[key] ? '✓' : '';
          updateProgress();
          buildSidebar();
        });
        subList.appendChild(row);
      });

      if(subList.children.length === 0) return;

      subHeader.addEventListener('click', () => {
        subHeader.classList.toggle('open');
        subList.classList.toggle('open');
      });

      subDiv.appendChild(subHeader);
      subDiv.appendChild(subList);
      body.appendChild(subDiv);
    });

    header.addEventListener('click', () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    });

    section.appendChild(header);
    section.appendChild(progressBar);
    section.appendChild(body);
    content.appendChild(section);
  });
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgress() {
  const total = totalProbs();
  const done = totalSolved();
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('solvedCount').textContent = done;
  document.getElementById('totalProbs').textContent = total;
  document.getElementById('pctDone').textContent = pct + '%';
  document.getElementById('footCount').textContent = `${done} / ${total}`;
  document.getElementById('footPct').textContent = pct + '%';
  document.getElementById('footFill').style.width = pct + '%';
  document.getElementById('sidebarFill').style.width = pct + '%';
  document.getElementById('sidebarPct').textContent = pct + '%';
}

// ============================================================
// FILTERS & SEARCH
// ============================================================
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.f;
    buildContent();
  });
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    buildContent();
  }, 200);
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// INIT
// ============================================================
buildSidebar();
buildContent();
updateProgress();
</script>
