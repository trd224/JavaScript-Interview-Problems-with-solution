<html lang="en">
<head>
<meta charset="UTF-8">

<title>React Complete Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --beginner: #00e5a0; --mid: #f59e0b; --advanced: #f43f5e;
    --text: #e2e8f0; --muted: #64748b; --accent: #6366f1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; padding-bottom:80px; }

  header {
    background:linear-gradient(135deg,#0f0f1a 0%,#111130 100%);
    border-bottom:1px solid var(--border);
    padding:36px 40px 24px;  top:0; z-index:100;
    backdrop-filter:blur(20px);
  }
  .header-inner { max-width:1000px; margin:0 auto; }
  h1 {
    font-size:clamp(1.7rem,4vw,2.6rem); font-weight:800; letter-spacing:-1px;
    background:linear-gradient(90deg,#fff 30%,#6366f1 80%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .subtitle { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.78rem; margin-top:5px; }
  .stats { display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; }
  .stat { display:flex; align-items:center; gap:6px; font-size:0.8rem; font-family:'JetBrains Mono',monospace; }
  .dot { width:8px; height:8px; border-radius:50%; }
  .controls { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; align-items:center; }
  .filter-btn {
    padding:5px 14px; border-radius:999px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Syne',sans-serif;
    font-size:0.76rem; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .filter-btn:hover { border-color:#3a3a5e; color:var(--text); }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .filter-btn.b.active { background:var(--beginner); border-color:var(--beginner); color:#000; }
  .filter-btn.m.active { background:var(--mid); border-color:var(--mid); color:#000; }
  .filter-btn.a.active { background:var(--advanced); border-color:var(--advanced); color:#fff; }
  .search-wrap { flex:1; max-width:340px; }
  .search-wrap input {
    width:100%; background:#13131d; border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem;
    padding:7px 13px; outline:none; transition:border-color 0.2s;
  }
  .search-wrap input:focus { border-color:var(--accent); }
  .search-wrap input::placeholder { color:var(--muted); }

  main { max-width:1000px; margin:28px auto; padding:0 18px; }
  .topic-section { margin-bottom:40px; }
  .topic-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border);
  }
  .topic-icon { font-size:1.1rem; }
  .topic-title { font-size:1.1rem; font-weight:800; letter-spacing:-0.3px; }
  .topic-count { margin-left:auto; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.72rem; }

  .question-list { display:flex; flex-direction:column; gap:2px; }
  .question-item {
    display:flex; align-items:flex-start; gap:10px;
    padding:10px 14px; background:var(--surface);
    border:1px solid var(--border); border-radius:7px;
    transition:all 0.15s; cursor:default;
  }
  .question-item:hover { border-color:#2a2a4e; background:#13131d; transform:translateX(3px); }
  .question-item.hidden { display:none !important; }
  .question-item.duplicate{
    opacity:.45;
    filter:grayscale(35%);
  }
  .question-item.duplicate:hover{
    opacity:.8;
  }
  .q-num { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--muted); min-width:28px; padding-top:2px; flex-shrink:0; }
  .q-text { font-size:0.9rem; line-height:1.55; flex:1; }
  .q-level {
    font-family:'JetBrains Mono',monospace; font-size:0.58rem;
    padding:2px 6px; border-radius:4px; white-space:nowrap; margin-top:3px; font-weight:700; flex-shrink:0;
  }
  .q-level.B { background:rgba(0,229,160,0.1); color:var(--beginner); }
  .q-level.M { background:rgba(245,158,11,0.1); color:var(--mid); }
  .q-level.A { background:rgba(244,63,94,0.1); color:var(--advanced); }

  .topic-section.all-hidden { display:none; }
  .other-badge { color:#f59e0b !important; font-weight:700; }
  .repeat-tag{
    display:inline-flex;
    align-items:center;
    margin-left:8px;
    padding:2px 7px;
    border-radius:999px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.62rem;
    font-weight:700;
    background:rgba(245,158,11,0.13);
    color:#fcd34d;
    border:1px solid rgba(245,158,11,0.45);
    vertical-align:middle;
  }
  .no-results-msg { text-align:center; color:var(--muted); font-family:'JetBrains Mono',monospace; padding:60px 0; }

  @media(max-width:600px){
    header{padding:20px 12px 16px;}
    main{padding:0 8px;}
    .q-level{display:none;}
    .controls{gap:6px;}
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>React Complete Question Bank</h1>
    <p class="subtitle">// All topics </p>
    <div class="stats">
      <div class="stat"><span class="dot" style="background:var(--beginner)"></span><span id="cnt-b">– Beginner</span></div>
      <div class="stat"><span class="dot" style="background:var(--mid)"></span><span id="cnt-m">– Intermediate</span></div>
      <div class="stat"><span class="dot" style="background:var(--advanced)"></span><span id="cnt-a">– Advanced</span></div>
      <div class="stat"><span class="dot" style="background:#6366f1"></span><span id="cnt-t">– Total</span></div>
    </div>
    <div class="controls">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn b" onclick="setFilter('B',this)">Beginner</button>
      <button class="filter-btn m" onclick="setFilter('M',this)">Intermediate</button>
      <button class="filter-btn a" onclick="setFilter('A',this)">Advanced</button>
      <div class="search-wrap"><input id="q-search" type="text" placeholder="Search questions…" oninput="applyFilters()"></div>
    </div>
  </div>
</header>

let curFilter = 'all', qNum = 0;

function build() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let b=0, m=0, a=0;

  T.forEach(topic => {
    // Deduplicate within topic by lowercased text
    const seen = new Set();
    const unique = topic.qs.filter(([q]) => {
      const k = q.toLowerCase().trim();
      if (seen.has(k)) return false;
      seen.add(k); return true;
    }).sort((a,b) => {
      const order = { B: 0, M: 1, A: 2 };
      return order[a[1]] - order[b[1]];
    });

    const sec = document.createElement('section');
    sec.className = 'topic-section';

    sec.innerHTML = `<div class="topic-header">
      <span class="topic-icon">${topic.icon}</span>
      <span class="topic-title">${topic.title}</span>
      <span class="topic-count">${unique.length} questions</span>
    </div>`;

    const list = document.createElement('div');
    list.className = 'question-list';

    unique.forEach(([q, lv]) => {
      qNum++;
      if (lv==='B') b++; else if (lv==='M') m++; else a++;
      const d = document.createElement('div');
      d.className = 'question-item';
      d.dataset.level = lv;
      d.dataset.q = q.toLowerCase();
      d.innerHTML = `<span class="q-num">${String(qNum).padStart(3,'0')}</span>
        <span class="q-text">${q}</span>
        <span class="q-level ${lv}">${lv==='B'?'Beginner':lv==='M'?'Mid':'Advanced'}</span>`;
      list.appendChild(d);
    });

    sec.appendChild(list);
    main.appendChild(sec);
  });

  document.getElementById('cnt-b').textContent = b+' Beginner';
  document.getElementById('cnt-m').textContent = m+' Intermediate';
  document.getElementById('cnt-a').textContent = a+' Advanced';
  document.getElementById('cnt-t').textContent = (b+m+a)+' Total';
  applyFilters();
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const s = document.getElementById('q-search').value.toLowerCase().trim();
  document.querySelectorAll('.question-item').forEach(el => {
    const lvOk = curFilter==='all' || el.dataset.level===curFilter;
    const srOk = !s || el.dataset.q.includes(s);
    el.classList.toggle('hidden', !(lvOk && srOk));
  });
  document.querySelectorAll('.topic-section').forEach(sec => {
    const any = [...sec.querySelectorAll('.question-item')].some(i=>!i.classList.contains('hidden'));
    sec.classList.toggle('all-hidden', !any);
  });
}

function cleanQuestionText(text){
  return text.toLowerCase()
    .replace(/\[[^\]]*\]/g,'')
    .replace(/[“”"'’‘]/g,'')
    .replace(/[()<>.,:;!?/+-]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function repeatKey(text){
  let q = cleanQuestionText(text);

  const versionMatch = q.match(/\breact\s+(18|19)\b/);
  const version = versionMatch ? ':react' + versionMatch[1] : '';

  // Same custom hook but different wording
  const hookMatch = q.match(/\buse[a-z0-9]+\b/i);
  if (hookMatch && q.includes('custom hook')) return 'custom-hook:' + hookMatch[0].toLowerCase();

  // Built-in hook repeated in different wording
  const builtInHookMatch = q.match(/\b(usecontext|useid|usetransition|usedeferredvalue|usesyncexternalstore|useinsertioneffect|useoptimistic|useactionstate)\b/i);
  if (builtInHookMatch) return 'built-in-hook:' + builtInHookMatch[0].toLowerCase() + version;

  // Avoid wrong matching: normal controlled component and controlled pattern are not same
  if (q.includes('controlled component pattern')) return 'pattern:controlled-component';
  if (q === 'what is a controlled component' || q === 'what is a controlled component in forms') return 'form:controlled-component';

  q = q.replace(/^what is the /,'what is ');
  q = q.replace(/^what are the /,'what are ');
  q = q.replace(/^how do you /,'how ');
  q = q.replace(/^how does /,'how ');
  q = q.replace(/^write a custom hook /,'custom hook ');
  q = q.replace(/^write a /,'write ');
  q = q.replace(/^write /,'');

  const replacements = [
    [' and why is it used',''], [' and why use it',''], [' and why is it popular',''],
    [' and when should you use it',''], [' and when is it used',''],
    [' and how does it work',''], [' and how is it used',''],
    [' and what problem does it solve',''], [' inside a react component',''],
    [' in a react application',' in react app'], [' large react application',' large react app'],
    [' introduced in react 18',''], [' in react 18',''], [' introduced in react 19',''], [' in react 19',''],
    [' hook',''], [' api','']
  ];

  replacements.forEach(([a,b]) => q = q.replaceAll(a,b));
  q = q.replace(/\s+/g,' ').trim();

  if (q.includes('major new features')) return q + version;

  return q + version;
}

function markRepeatedQuestions(){
  const items=[...document.querySelectorAll('.question-item')];
  const groups={};

  items.forEach(item=>{
    const num=item.querySelector('.q-num')?.textContent.trim();
    const qTextEl=item.querySelector('.q-text');
    const text=qTextEl?.childNodes[0]?.textContent.trim() || qTextEl?.textContent.trim();
    const key=repeatKey(text);

    if(!key || key.length<4) return;
    groups[key]=groups[key]||[];
    groups[key].push({item,num,text});
  });

  Object.values(groups).forEach(arr=>{
    if(arr.length>1){
      arr.forEach(cur=>{
        const others=arr.filter(x=>x.num!==cur.num).map(x=>x.num);
        const qTextEl=cur.item.querySelector('.q-text');
        const old=qTextEl.querySelector('.repeat-tag');
        if(old) old.remove();

        const tag=document.createElement('span');
        tag.className='repeat-tag';
        tag.title='Repeated with question number '+others.join(', ');
        
const firstNum = Math.min(...arr.map(x => parseInt(x.num,10)));
if(parseInt(cur.num,10)!==firstNum){
  tag.textContent='Duplicate of '+firstNum;
  cur.item.classList.add('duplicate');
}

        qTextEl.appendChild(tag);
      });
    }
  });
}

  main.appendChild(headingEl);

  OTHER_QUESTIONS.forEach(topic => {
    const seen = new Set();
    const unique = topic.qs.filter(([q]) => {
      const k = q.toLowerCase().trim();
      if (seen.has(k)) return false;
      seen.add(k); return true;
    }).sort((a,b) => {
      const order = { B: 0, M: 1, A: 2 };
      return order[a[1]] - order[b[1]];
    });

    const sec = document.createElement('section');
    sec.className = 'topic-section other-section';

    sec.innerHTML = `<div class="topic-header">
      <span class="topic-icon">${topic.icon}</span>
      <span class="topic-title">${topic.title}</span>
      <span class="topic-count">${unique.length} questions</span>
    </div>`;

    const list = document.createElement('div');
    list.className = 'question-list';

    unique.forEach(([q, lv]) => {
      otherNum++;
      const d = document.createElement('div');
      d.className = 'question-item';
      d.dataset.level = lv;
      d.dataset.q = q.toLowerCase();
      d.innerHTML = `<span class="q-num other-badge">${String(otherNum).padStart(3,'0')}</span>
        <span class="q-text">${q}</span>
        <span class="q-level ${lv}">${lv==='B'?'Beginner':lv==='M'?'Mid':'Advanced'}</span>`;
      list.appendChild(d);
    });

    sec.appendChild(list);
    main.appendChild(sec);
  });
}
