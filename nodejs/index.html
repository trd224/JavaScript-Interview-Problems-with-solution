let totalCount = 0;

function buildSection(levelKey, sectionEl) {
  const categories = data[levelKey];
  for (const [catName, questions] of Object.entries(categories)) {
    totalCount += questions.length;
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    const catTitle = document.createElement('div');
    catTitle.className = 'category-name';
    catTitle.textContent = catName;
    catDiv.appendChild(catTitle);
    const grid = document.createElement('div');
    grid.className = 'questions-grid';
    questions.forEach((q, i) => {
      const item = document.createElement('div');
      item.className = 'q-item';
      item.dataset.q = q.toLowerCase();
      item.dataset.level = levelKey;
      item.innerHTML = `<span class="q-num">${String(i+1).padStart(2,'0')}</span><span class="q-text">${q}</span>`;
      grid.appendChild(item);
    });
    catDiv.appendChild(grid);
    sectionEl.appendChild(catDiv);
  }
}

buildSection('beginner', document.getElementById('beginner'));
buildSection('mid', document.getElementById('mid'));
buildSection('advanced', document.getElementById('advanced'));
document.getElementById('totalCount').textContent = totalCount;

let currentTab = 'beginner';
function switchTab(level) {
  currentTab = level;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(level).classList.add('active');
  document.querySelector('.tab.' + level).classList.add('active');
  const val = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!val) document.querySelectorAll('.q-item').forEach(i => i.classList.remove('hidden'));
  else runSearch(val);
}

document.getElementById('searchInput').addEventListener('input', function() {
  runSearch(this.value.trim().toLowerCase());
});

function runSearch(val) {
  const allItems = document.querySelectorAll('.q-item');
  if (!val) {
    allItems.forEach(i => i.classList.remove('hidden'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(currentTab).classList.add('active');
    document.getElementById('noResults').style.display = 'none';
    return;
  }
  document.querySelectorAll('.section').forEach(s => s.classList.add('active'));
  let found = 0;
  allItems.forEach(item => {
    const matches = item.dataset.q.includes(val);
    item.classList.toggle('hidden', !matches);
    if (matches) found++;
  });
  document.getElementById('noResults').style.display = found === 0 ? 'block' : 'none';
}
