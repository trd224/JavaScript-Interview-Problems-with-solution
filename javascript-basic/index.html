<style>
:root {

*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(circle at top,#182033 0,#0d1117 42%);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh;}
header{padding:52px 24px 30px;text-align:center;border-bottom:1px solid var(--border)}
.badge{display:inline-block;color:var(--accent);border:1px solid rgba(247,223,30,.35);background:rgba(247,223,30,.08);padding:7px 14px;border-radius:999px;font:700 12px JetBrains Mono,monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(30px,5vw,58px);line-height:1.05;margin-bottom:12px;font-weight:800} h1 span{color:var(--accent)}
.sub{color:var(--muted);font-family:JetBrains Mono,monospace;font-size:13px}
.stats{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;padding:22px 20px;border-bottom:1px solid var(--border);background:rgba(13,17,23,.65);backdrop-filter:blur(10px)}
.stat{min-width:135px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px} .num{font:800 28px JetBrains Mono,monospace;color:var(--accent)} .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.controls{position:sticky;top:0;z-index:10;display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:16px 24px;background:rgba(13,17,23,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
#search{flex:1;min-width:230px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font:14px JetBrains Mono,monospace;outline:none} #search:focus{border-color:var(--accent)}

h2{font-size:22px;color:#fff} .section-count{font:12px JetBrains Mono,monospace;color:var(--muted)}
.q-grid{display:grid;gap:9px} .q{display:grid;grid-template-columns:55px 1fr auto;gap:12px;align-items:start;background:linear-gradient(180deg,var(--card),#111827);border:1px solid var(--border);border-left:4px solid var(--level-color);border-radius:12px;padding:13px 14px;transition:.15s}

footer{text-align:center;color:var(--muted);font-size:12px;padding:30px}
@media(max-width:650px){.q{grid-template-columns:42px 1fr}.q-level{display:none}.section-head{align-items:start;flex-direction:column}}

.section,

}

  display:block;
  color:#cbd5e1;
  text-decoration:none;
  padding:10px 12px;

  font-size:14px;

  background:#1e293b;

body{

let currentFilter = 'all';
function levelClass(level){ return (level || 'beginner').toLowerCase().replace(/\s+/g,'-').replace('mid','intermediate').replace('mid-level','intermediate'); }
function esc(s){ return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function render(){
  const content = document.getElementById('content');
  const leftMenu = document.getElementById('leftMenu');
  let html='';
  let menuHtml='<h2>JavaScript Topics</h2>';
  let num=1;
  let total=0,beg=0,mid=0,adv=0;
  data.forEach((sec, idx)=>{
    menuHtml += `<a href="#topic-${idx}" class="side-link" data-index="${idx}">${idx + 1}. ${esc(sec.section)}</a>`;
    const questions = sec.questions.map(q=>({...q, num:num++})); total += questions.length;
    questions.forEach(q=>{ const l=levelClass(q.level); if(l==='beginner') beg++; else if(l==='advanced') adv++; else mid++; });
    html += `<section class="section" id="topic-${idx}" data-section="${idx}"><div class="section-head"><h2>${esc(sec.section)}</h2><span class="section-count">${questions.length} questions</span></div><div class="q-grid">`;
    questions.forEach(q=>{ const l=levelClass(q.level); const searchable=(sec.section + ' ' + q.q).toLowerCase(); html += `<div class="q ${l}" data-level="${l}" data-text="${esc(q.q.toLowerCase())}" data-search-text="${esc(searchable)}"><span class="q-num">#${String(q.num).padStart(3,'0')}</span><span class="q-text">${esc(q.q)}</span><span class="q-level">${l}</span></div>`; });
    html += `</div></section>`;
  });
  content.innerHTML = html; if(leftMenu){ leftMenu.innerHTML = menuHtml; } document.getElementById('totalStat').textContent=total; document.getElementById('begStat').textContent=beg; document.getElementById('midStat').textContent=mid; document.getElementById('advStat').textContent=adv;
  applyFilters();
}
function setFilter(filter, btn){ currentFilter=filter; document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilters(); }


function applyFilters(){
  const searchInput = document.getElementById('search') || document.getElementById('searchInput');
  const term = (searchInput ? searchInput.value : '').toLowerCase().trim();
  let visible = 0;

  document.querySelectorAll('.section').forEach(section => {
    let sectionVisible = 0;

    section.querySelectorAll('.q').forEach(q => {
      const okFilter = currentFilter === 'all' || q.dataset.level === currentFilter;
      const questionText = (q.dataset.searchText || q.dataset.text || '').toLowerCase();
      const okSearch = !term || questionText.includes(term);

      const shouldShow = okFilter && okSearch;
      q.classList.toggle('hidden', !shouldShow);

      if(shouldShow){
        visible++;
        sectionVisible++;
      }
    });

    section.classList.toggle('hidden', sectionVisible === 0);
  });

  const noResults = document.getElementById('noResults');
  if(noResults){
    noResults.style.display = visible ? 'none' : 'block';
  }
}


render();
</script>




<script>
document.addEventListener('click', function(event){
  const link = event.target.closest('.side-link');
  if(!link) return;

  event.preventDefault();

  const targetId = (link.getAttribute('href') || '').replace('#', '');
  const target = document.getElementById(targetId);

  if(target){
    window.scrollTo({
      top: target.getBoundingClientRect().top + window.pageYOffset - 10,
      behavior: 'smooth'
    });
    history.pushState(null, '', '#' + targetId);
  }

  document.querySelectorAll('.side-link').forEach(function(item){
    item.classList.remove('active');
  });
  link.classList.add('active');
});
</script>
