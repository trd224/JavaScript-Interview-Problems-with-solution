<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Interview Questions — Beginner to Advanced</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #f0e040;
    --accent2: #40e0f0;
    --accent3: #f040a0;
    --text: #e8e8f0;
    --muted: #7878a0;
    --beginner: #40f090;
    --mid: #f0a040;
    --advanced: #f04060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,224,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,224,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
    position: relative;
  }

  .header-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #f0e040 0%, #40e0f0 50%, #f040a0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    max-width: 600px;
    line-height: 1.8;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin: 32px 0;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 36px;
    align-items: center;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .filter-btn.beginner.active { background: var(--beginner); border-color: var(--beginner); }
  .filter-btn.mid.active { background: var(--mid); border-color: var(--mid); }
  .filter-btn.advanced.active { background: var(--advanced); border-color: var(--advanced); }

  .search-box {
    flex: 1;
    min-width: 200px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent2); }
  .search-box::placeholder { color: var(--muted); }

  /* SECTION */
  .section {
    margin-bottom: 56px;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .section-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* QUESTION CARDS */
  .questions-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .q-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 18px;
    background: var(--surface);
    border-left: 3px solid transparent;
    transition: all 0.15s;
    cursor: default;
    position: relative;
  }

  .q-item:hover {
    background: var(--card);
    border-left-color: var(--accent);
  }

  .q-item.beginner { --lvl-color: var(--beginner); }
  .q-item.mid { --lvl-color: var(--mid); }
  .q-item.advanced { --lvl-color: var(--advanced); }
  .q-item:hover { border-left-color: var(--lvl-color); }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 40px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .q-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
  }

  .q-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    flex-shrink: 0;
    color: var(--bg);
    background: var(--lvl-color);
    align-self: flex-start;
    margin-top: 2px;
  }

  .hidden { display: none !important; }

  /* SCROLL TO TOP */
  .scroll-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 44px;
    height: 44px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    font-size: 20px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-weight: 700;
  }

  .scroll-top.visible { display: flex; }

  /* PROGRESS */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    z-index: 200;
    transition: width 0.1s;
  }

  /* NO RESULTS */
  .no-results {
    display: none;
    padding: 60px 0;
    text-align: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }

  .no-results.visible { display: block; }

  @media (max-width: 600px) {
    .stats-bar { gap: 20px; }
    .q-badge { display: none; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<div class="container">
  <header>
    <div class="header-tag">// interview prep</div>
    <h1>JavaScript<br>Interview Qs</h1>
    <p class="subtitle">Complete question bank from beginner to advanced — covering every core JavaScript topic for interview preparation.</p>

    <div class="stats-bar">
      <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">Total Questions</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--beginner)" id="beginnerCount">0</span><span class="stat-label">Beginner</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--mid)" id="midCount">0</span><span class="stat-label">Mid Level</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--advanced)" id="advancedCount">0</span><span class="stat-label">Advanced</span></div>
    </div>
  </header>

  <div class="controls">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn beginner" data-filter="beginner" onclick="setFilter('beginner',this)">Beginner</button>
    <button class="filter-btn mid" data-filter="mid" onclick="setFilter('mid',this)">Mid Level</button>
    <button class="filter-btn advanced" data-filter="advanced" onclick="setFilter('advanced',this)">Advanced</button>

  </div>

  <div id="questionsContainer"></div>
  <div class="no-results" id="noResults">No questions match your search.</div>
</div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

let currentFilter = 'all';
let allQuestions = [];
let globalIndex = 1;

function buildUI() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  globalIndex = 1;

  let totalB = 0, totalM = 0, totalA = 0;

  data.forEach(section => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';
    secDiv.setAttribute('data-section', section.section);

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<span class="section-title">${section.section}</span><span class="section-count">${section.questions.length} questions</span>`;
    secDiv.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'questions-grid';

    section.questions.forEach(q => {
      const item = document.createElement('div');
      item.className = `q-item ${q.level}`;
      item.setAttribute('data-level', q.level);
      item.setAttribute('data-text', q.q.toLowerCase());

      item.innerHTML = `
        <span class="q-num">#${String(globalIndex).padStart(3,'0')}</span>
        <span class="q-text">${q.q}</span>
        <span class="q-badge">${q.level === 'mid' ? 'Mid' : q.level.charAt(0).toUpperCase() + q.level.slice(1)}</span>
      `;

      grid.appendChild(item);
      allQuestions.push(item);
      globalIndex++;

      if (q.level === 'beginner') totalB++;
      else if (q.level === 'mid') totalM++;
      else totalA++;
    });

    secDiv.appendChild(grid);
    container.appendChild(secDiv);
  });

  const total = totalB + totalM + totalA;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('beginnerCount').textContent = totalB;
  document.getElementById('midCount').textContent = totalM;
  document.getElementById('advancedCount').textContent = totalA;
}

function setFilter(level, btn) {
  currentFilter = level;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchQuestions() {
  applyFilters();
}

function applyFilters() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  let visibleCount = 0;

  allQuestions.forEach(item => {
    const lvl = item.getAttribute('data-level');
    const txt = item.getAttribute('data-text');
    const matchLevel = currentFilter === 'all' || lvl === currentFilter;
    const matchSearch = !searchTerm || txt.includes(searchTerm);

    if (matchLevel && matchSearch) {
      item.classList.remove('hidden');
      visibleCount++;
    } else {
      item.classList.add('hidden');
    }
  });

  // Hide/show sections with no visible items
  document.querySelectorAll('.section').forEach(sec => {
    const visible = sec.querySelectorAll('.q-item:not(.hidden)').length;
    sec.style.display = visible === 0 ? 'none' : '';
  });

  document.getElementById('noResults').classList.toggle('visible', visibleCount === 0);
}

// Scroll progress
window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = (scrollTop / docHeight) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('scrollTopBtn').classList.toggle('visible', scrollTop > 400);
});

buildUI();
</script>
