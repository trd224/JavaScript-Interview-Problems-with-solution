<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Questions Bank</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent-js: #f7df1e;
    --accent-begin: #4ade80;
    --accent-mid: #60a5fa;
    --accent-adv: #f472b6;
    --text: #e2e8f0;
    --muted: #64748b;
    --card: #13131f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 60px 40px 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(247,223,30,0.08) 0%, transparent 70%);
  }

  .hero-badge {
    display: inline-block;
    background: rgba(247,223,30,0.1);
    border: 1px solid rgba(247,223,30,0.3);
    color: var(--accent-js);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -2px;
  }

  .hero h1 span { color: var(--accent-js); }

  .hero p {
    margin-top: 16px;
    color: var(--muted);
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent-js);
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    padding: 24px 40px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent-js); }
  .search-box::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: currentColor;
  }

  .filter-btn.all.active { color: var(--accent-js); border-color: var(--accent-js); background: rgba(247,223,30,0.08); }
  .filter-btn.beginner.active { color: var(--accent-begin); border-color: var(--accent-begin); background: rgba(74,222,128,0.08); }
  .filter-btn.intermediate.active { color: var(--accent-mid); border-color: var(--accent-mid); background: rgba(96,165,250,0.08); }
  .filter-btn.advanced.active { color: var(--accent-adv); border-color: var(--accent-adv); background: rgba(244,114,182,0.08); }

  /* PROGRESS */
  .progress-bar-wrap {
    padding: 0 40px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent-js);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    gap: 0;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 73px;
    height: calc(100vh - 73px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }

  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--text); border-left-color: var(--accent-js); background: rgba(247,223,30,0.04); }

  .nav-item .count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 32px 40px;
    min-width: 0;
  }

  /* CONCEPT SECTION */
  .concept-section {
    margin-bottom: 48px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .concept-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .concept-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .concept-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .concept-meta {
    margin-left: auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .level-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    font-weight: 700;
  }

  .level-badge.beginner { background: rgba(74,222,128,0.1); color: var(--accent-begin); border: 1px solid rgba(74,222,128,0.2); }
  .level-badge.intermediate { background: rgba(96,165,250,0.1); color: var(--accent-mid); border: 1px solid rgba(96,165,250,0.2); }
  .level-badge.advanced { background: rgba(244,114,182,0.1); color: var(--accent-adv); border: 1px solid rgba(244,114,182,0.2); }

  /* QUESTIONS */
  .questions-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .question-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .question-item:hover {
    border-color: rgba(247,223,30,0.2);
    background: rgba(247,223,30,0.02);
    transform: translateX(3px);
  }

  .question-item.checked {
    border-color: rgba(74,222,128,0.3);
    background: rgba(74,222,128,0.03);
  }

  .question-item.checked .q-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(100,116,139,0.5);
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 32px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .q-checkbox {
    width: 16px;
    height: 16px;
    border: 1px solid var(--muted);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 10px;
  }

  .question-item.checked .q-checkbox {
    background: var(--accent-begin);
    border-color: var(--accent-begin);
    color: #000;
  }

  .q-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    font-weight: 400;
    transition: color 0.15s;
  }

  .q-level {
    margin-left: auto;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .q-level.beginner { background: var(--accent-begin); }
  .q-level.intermediate { background: var(--accent-mid); }
  .q-level.advanced { background: var(--accent-adv); }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
  }

  /* SCROLL TO TOP */
  .scroll-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 44px;
    height: 44px;
    background: var(--accent-js);
    color: #000;
    border: none;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    font-weight: 800;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 200;
  }

  .scroll-top.visible { opacity: 1; pointer-events: all; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .controls { padding: 16px 20px; }
    .content { padding: 24px 20px; }
    .stats { gap: 24px; padding: 16px 20px; }
    .hero { padding: 40px 20px 30px; }
    .progress-bar-wrap { padding: 0 20px 16px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">

  <h1>500+ <span>JavaScript</span><br>Interview Questions</h1>
  <p>Beginner → Intermediate → Advanced · Concept by Concept</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total Questions</div></div>

  <div class="stat"><div class="stat-num" id="conceptCount">0</div><div class="stat-label">Concepts</div></div>
  <div class="stat"><div class="stat-num" id="visibleCount">0</div><div class="stat-label">Showing</div></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input class="search-box" type="text" id="searchInput" placeholder="Search questions...">

  <button class="filter-btn beginner" onclick="setFilter('beginner')">Beginner</button>
  <button class="filter-btn intermediate" onclick="setFilter('intermediate')">Intermediate</button>
  <button class="filter-btn advanced" onclick="setFilter('advanced')">Advanced</button>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 0 completed</div>

<!-- MAIN -->
<div class="main">
  <nav class="sidebar" id="sidebar">

  <div class="content" id="content"></div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

// STATE
// =============================================
let currentFilter = 'all';
let checkedItems = JSON.parse(localStorage.getItem('js_checked') || '{}');
let questionNumber = 1;

// =============================================
// BUILD UI
// =============================================
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sidebar-title">Concepts</div>';
  concepts.forEach(c => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.id = `nav-${c.id}`;
    item.onclick = () => {
      document.getElementById(`section-${c.id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    const count = c.questions.length;
    item.innerHTML = `
      <span class="nav-dot" style="background:${c.color}"></span>
      <span>${c.title}</span>
      <span class="count">${count}</span>
    `;
    sidebar.appendChild(item);
  });
}

function buildContent() {
  questionNumber = 1;
  const content = document.getElementById('content');
  content.innerHTML = '';

  let visibleTotal = 0;
  let hasAny = false;

  concepts.forEach(c => {
    const filtered = c.questions.filter(q =>
      currentFilter === 'all' || q.level === currentFilter
    );
    if (filtered.length === 0) return;
    hasAny = true;
    visibleTotal += filtered.length;

    const section = document.createElement('div');
    section.className = 'concept-section';
    section.id = `section-${c.id}`;

    const levels = [...new Set(filtered.map(q => q.level))];
    const badges = levels.map(l => `<span class="level-badge ${l}">${l}</span>`).join('');

    section.innerHTML = `
      <div class="concept-header">
        <div class="concept-icon" style="background:${c.color}22; color:${c.color}; font-size:20px">${c.icon}</div>
        <div>
          <div class="concept-title">${c.title}</div>
        </div>
        <div class="concept-meta">${badges}</div>
      </div>
      <div class="questions-grid" id="grid-${c.id}"></div>
    `;
    content.appendChild(section);

    const grid = section.querySelector(`#grid-${c.id}`);
    filtered.forEach(q => {
      const num = questionNumber++;
      const key = `${c.id}-${num}-${q.text.slice(0,20)}`;
      const isChecked = !!checkedItems[key];

      const item = document.createElement('div');
      item.className = `question-item${isChecked ? ' checked' : ''}`;
      item.dataset.level = q.level;
      item.dataset.key = key;
      item.onclick = () => toggleCheck(item, key);
      item.innerHTML = `
        <span class="q-num">#${String(num).padStart(3,'0')}</span>
        <div class="q-checkbox">${isChecked ? '✓' : ''}</div>
        <div class="q-text">${q.text}</div>
        <div class="q-level ${q.level}"></div>
      `;
      grid.appendChild(item);
    });
  });

  if (!hasAny) {
    content.innerHTML = `<div class="no-results">// no questions found for this filter</div>`;
  }

  updateStats(visibleTotal);
}

function toggleCheck(item, key) {
  const checked = item.classList.toggle('checked');
  item.querySelector('.q-checkbox').textContent = checked ? '✓' : '';
  if (checked) checkedItems[key] = true;
  else delete checkedItems[key];
  localStorage.setItem('js_checked', JSON.stringify(checkedItems));
  updateStats();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn.${f}`).classList.add('active');
  buildContent();
}

function updateStats(visibleCount) {
  const total = concepts.reduce((s, c) => s + c.questions.length, 0);
  const checked = Object.keys(checkedItems).length;
  const shown = visibleCount ?? document.querySelectorAll('.question-item').length;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('checkedCount').textContent = checked;
  document.getElementById('conceptCount').textContent = concepts.length;
  document.getElementById('visibleCount').textContent = shown;

  const pct = total > 0 ? (checked / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${checked} / ${total} completed`;
}

// SEARCH
document.getElementById('searchInput').addEventListener('input', function() {
  const term = this.value.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.question-item').forEach(item => {
    const text = item.querySelector('.q-text').textContent.toLowerCase();
    const match = !term || text.includes(term);
    item.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  document.querySelectorAll('.concept-section').forEach(sec => {
    const anyVisible = sec.querySelectorAll('.question-item:not(.hidden)').length > 0;
    sec.classList.toggle('hidden', !anyVisible);
  });
  document.getElementById('visibleCount').textContent = visible;
});

// SCROLL TO TOP
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
});

// ACTIVE NAV
window.addEventListener('scroll', () => {
  const sections = document.querySelectorAll('.concept-section');
  let current = '';
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top < 200) current = sec.id.replace('section-','');
  });
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.id === `nav-${current}`);
  });
});

// INIT
buildSidebar();
buildContent();
</script>
</body>
</html>
