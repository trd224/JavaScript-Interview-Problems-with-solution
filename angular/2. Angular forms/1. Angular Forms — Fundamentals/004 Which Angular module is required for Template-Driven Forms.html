<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormsModule in Angular</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#0f0f1a;
  color:#cdd6f4;
  padding:2rem;
  line-height:1.7;
}

h2{color:#89b4fa;margin-top:25px}
h3{color:#a6e3a1;margin-top:15px}

pre{
  background:#1e1e2e;
  padding:1rem;
  border-radius:10px;
  overflow:auto;
  font-family:'Fira Code',monospace;
  line-height:1.8;
}

/* syntax colors */
.prop{color:#ffb86c;}
.type{color:#8be9fd;}
.str{color:#f1fa8c;}
.tag{color:#ff79c6;}
.attr{color:#50fa7b;}
.bind{color:#bd93f9;}
</style>
</head>

<body>

<h2>FormsModule is the Angular module required for Template-Driven Forms.</h2>

<h3>We import it like this:</h3>

<pre>
import { <span class="type">FormsModule</span> } from <span class="str">'@angular/forms'</span>;
</pre>

<h3>Then add it in imports:</h3>

<pre>
@<span class="type">NgModule</span>({
  <span class="prop">imports</span>: [<span class="type">FormsModule</span>]
})
</pre>

</body>
</html>
