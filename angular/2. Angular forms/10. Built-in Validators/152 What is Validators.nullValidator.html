<!DOCTYPE html>

<head>

<title>Validators.nullValidator in Angular</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<style>
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#cdd6f4;padding:2rem;line-height:1.8;}
h1{color:#89b4fa;text-align:center;} h2{color:#a6e3a1;}
pre{background:#1e1e2e!important;border:1px solid #313244;border-radius:12px;padding:1rem;overflow:auto;}
</style>
</head>
<body>

<h1>Validators.nullValidator in Angular</h1>

<p>
  <strong>Validators.nullValidator</strong> means no validation is applied.
</p>

<h2>🔹 TypeScript</h2>

<pre><code class="language-typescript">username: new FormControl('', Validators.nullValidator)
</code></pre>

<p>
  This control will always be valid because no validator is checking it.
</p>
