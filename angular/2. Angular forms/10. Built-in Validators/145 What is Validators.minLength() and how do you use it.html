<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Validators.minLength() in Angular</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">

  <style>

    body{
      font-family:'Segoe UI',sans-serif;
      background:#0f0f1a;
      color:#cdd6f4;
      padding:2rem;
      line-height:1.8;
    }

    h1{
      color:#89b4fa;
      text-align:center;
      margin-bottom:40px;
    }

    h2{
      color:#a6e3a1;
      margin-top:30px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th,td{
      border:1px solid #45475a;
      padding:12px;
      text-align:left;
    }

    th{
      background:#181825;
      color:#89b4fa;
    }

    td{
      background:#1e1e2e;
    }

    pre{
      background:#1e1e2e!important;
      border:1px solid #313244;
      border-radius:12px;
      padding:1rem;
      overflow:auto;
    }

  </style>

</head>

<body>

  <h1>
    Validators.minLength() in Angular
  </h1>

  <p>
    <strong>Validators.minLength()</strong>
    checks the minimum number of characters required.
  </p>

  <h2>
    🔹 TypeScript
  </h2>

  <pre><code class="language-typescript">username: new FormControl('', [
  Validators.minLength(3)
])
</code></pre>

  <h2>
    🔹 Validation Results
  </h2>

  <table>

    <tr>
      <th>Input</th>
      <th>Result</th>
    </tr>

    <tr>
      <td>Ri</td>
      <td>❌ Invalid</td>
    </tr>

    <tr>
      <td>Rizwan</td>
      <td>✅ Valid</td>
    </tr>

  </table>

  <p>
    Here minimum 3 characters are required.
  </p>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>

</body>

</html>
